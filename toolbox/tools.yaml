# toolbox/tools.yaml
sources:
  alloydb-pg:
    kind: postgres
    host: 10.43.0.2
    port: 5432
    database: productivity_db
    user: productivity_user
    password: AppPassword456!

toolsets:
  task-tools:
    - create-task
    - list-tasks
    - update-task-status
    - get-task

  calendar-tools:
    - create-event
    - list-events
    - check-availability

  notes-tools:
    - create-note
    - list-notes

  semantic-search:
    - semantic-search-notes
    - semantic-search-tasks

tools:

  # ── TASK TOOLS ─────────────────────────────────────────────

  create-task:
    kind: postgres-sql
    source: alloydb-pg
    description: >
      Create a new task for the user. Returns the created task with its ID.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: title
        type: string
        description: Short title of the task
      - name: description
        type: string
        description: Detailed description (can be empty string)
      - name: priority
        type: string
        description: "One of: low, medium, high"
      - name: due_date
        type: string
        description: "ISO 8601 datetime string or empty string"
    statement: |
      INSERT INTO tasks (user_id, title, description, priority, due_date, embedding)
      VALUES (
        $1::uuid, $2, $3, $4,
        NULLIF($5, '')::timestamptz,
        embedding('text-embedding-005', $2 || ' ' || $3)
      )
      RETURNING id, title, status, priority, due_date, created_at;

  list-tasks:
    kind: postgres-sql
    source: alloydb-pg
    description: List all tasks for a user, optionally filtered by status.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: status_filter
        type: string
        description: "Filter by status: pending, in_progress, done. Use 'all' for no filter."
    statement: |
      SELECT id, title, description, status, priority, due_date, created_at
      FROM tasks
      WHERE user_id = $1::uuid
        AND ($2 = 'all' OR status = $2)
      ORDER BY
        CASE priority WHEN 'high' THEN 1 WHEN 'medium' THEN 2 ELSE 3 END,
        due_date NULLS LAST
      LIMIT 20;

  update-task-status:
    kind: postgres-sql
    source: alloydb-pg
    description: Update the status of a task.
    parameters:
      - name: task_id
        type: string
        description: UUID of the task
      - name: new_status
        type: string
        description: "New status: pending, in_progress, done, cancelled"
    statement: |
      UPDATE tasks SET status = $2, updated_at = NOW()
      WHERE id = $1::uuid
      RETURNING id, title, status, updated_at;

  get-task:
    kind: postgres-sql
    source: alloydb-pg
    description: Get a single task by ID.
    parameters:
      - name: task_id
        type: string
        description: UUID of the task
    statement: |
      SELECT id, title, description, status, priority, due_date, created_at
      FROM tasks WHERE id = $1::uuid;

  # ── CALENDAR TOOLS ──────────────────────────────────────────

  create-event:
    kind: postgres-sql
    source: alloydb-pg
    description: Create a new calendar event for the user.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: title
        type: string
        description: Event title
      - name: description
        type: string
        description: Event description
      - name: start_time
        type: string
        description: Start datetime in ISO 8601 format
      - name: end_time
        type: string
        description: End datetime in ISO 8601 format
      - name: location
        type: string
        description: Physical or virtual location
    statement: |
      INSERT INTO calendar_events
        (user_id, title, description, start_time, end_time, location)
      VALUES ($1::uuid, $2, $3, $4::timestamptz, $5::timestamptz, $6)
      RETURNING id, title, start_time, end_time, location;

  list-events:
    kind: postgres-sql
    source: alloydb-pg
    description: List upcoming calendar events for a user.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: days_ahead
        type: integer
        description: Number of days to look ahead (e.g. 7)
    statement: |
      SELECT id, title, description, start_time, end_time, location
      FROM calendar_events
      WHERE user_id = $1::uuid
        AND start_time BETWEEN NOW() AND NOW() + ($2 || ' days')::interval
      ORDER BY start_time
      LIMIT 20;

  check-availability:
    kind: postgres-sql
    source: alloydb-pg
    description: Check if a user has any events during a time slot.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: start_time
        type: string
        description: Slot start datetime
      - name: end_time
        type: string
        description: Slot end datetime
    statement: |
      SELECT
        COUNT(*) AS conflict_count,
        ARRAY_AGG(title) AS conflicting_events
      FROM calendar_events
      WHERE user_id = $1::uuid
        AND tstzrange(start_time, end_time) &&
            tstzrange($2::timestamptz, $3::timestamptz);

  # ── NOTES TOOLS ──────────────────────────────────────────────

  create-note:
    kind: postgres-sql
    source: alloydb-pg
    description: Save a new note with automatic embedding generation.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: title
        type: string
        description: Note title
      - name: content
        type: string
        description: Full text content of the note
      - name: tags
        type: string
        description: Comma-separated tags (e.g. "meeting,planning,q3")
    statement: |
      INSERT INTO notes (user_id, title, content, tags, embedding)
      VALUES (
        $1::uuid, $2, $3,
        string_to_array($4, ','),
        embedding('text-embedding-005', $2 || ' ' || $3)
      )
      RETURNING id, title, created_at;

  list-notes:
    kind: postgres-sql
    source: alloydb-pg
    description: List recent notes for a user.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
    statement: |
      SELECT id, title, LEFT(content, 200) AS preview, tags, created_at
      FROM notes
      WHERE user_id = $1::uuid
      ORDER BY created_at DESC
      LIMIT 10;

  # ── SEMANTIC SEARCH ──────────────────────────────────────────

  semantic-search-notes:
    kind: postgres-sql
    source: alloydb-pg
    description: >
      Search notes semantically using natural language. Returns most
      relevant notes even if exact words don't match.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: query
        type: string
        description: Natural language search query
      - name: limit
        type: integer
        description: Max results to return (default 5)
    statement: |
      SELECT
        id, title, content, tags, created_at,
        1 - (embedding <=> embedding('text-embedding-005', $2)) AS relevance
      FROM notes
      WHERE user_id = $1::uuid
        AND ai.if($2 || ' is related to the following text: ' || content, content)
      ORDER BY embedding <=> embedding('text-embedding-005', $2)
      LIMIT $3;

  semantic-search-tasks:
    kind: postgres-sql
    source: alloydb-pg
    description: Search tasks semantically using natural language.
    parameters:
      - name: user_id
        type: string
        description: UUID of the user
      - name: query
        type: string
        description: Natural language search query
      - name: limit
        type: integer
        description: Max results to return (default 5)
    statement: |
      SELECT
        id, title, description, status, priority, due_date,
        1 - (embedding <=> embedding('text-embedding-005', $2)) AS relevance
      FROM tasks
      WHERE user_id = $1::uuid
      ORDER BY embedding <=> embedding('text-embedding-005', $2)
      LIMIT $3;